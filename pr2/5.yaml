string_with_escapes: "Это строка с экранированными символами:\n\
  \\ - обратный слеш\n\
  \" - двойная кавычка\n\
  \b - backspace\n\
  \t - табуляция\n\
  \n - новая строка\n\
  \r - возврат каретки\n\
  \f - подача страницы\n\
  \x0A - шестнадцатеричный код (перевод строки)\n\
  \u263A - Unicode символ (☺)"