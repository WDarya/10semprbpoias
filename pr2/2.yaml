# Это комментарий в YAML. Он используется для пояснения кода,
# документации настроек или временного отключения конфигураций.
# Комментарии начинаются с символа '#' и игнорируются парсером.

# Конфигурация веб-сервера
server:
  port: 8080  # Порт для входящих соединений
  host: localhost  # Адрес для привязки

# Следующая настройка временно отключена
# debug: true